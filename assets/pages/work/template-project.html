<!-- HERO -->
<section class="project-hero">
    <img id="project-hero-image" alt="">
</section>

<!-- MAIN CONTENT -->
<main class="project-content">

    <!-- INTRO WINDOW -->
    <div class="project-window" id="project-intro-window">
        <div class="window-titlebar">
            <div class="title-left">
                <span>DETAILS.TXT</span>
            </div>

            <div class="title-buttons">
                <span class="btn-min"></span>
                <span class="btn-max"></span>
                <span class="btn-close"></span>
            </div>
        </div>

        <div class="window-body">
            <h1 id="project-title"></h1>
            <p class="subtitle" id="project-subtitle"></p>
        </div>
    </div>

    <!-- DESCRIPTION WINDOW -->
    <div class="project-window" id="project-description-window">
        <div class="window-titlebar">
            <span>DESCRIPTION.TXT</span>

            <div class="title-buttons">
                <span class="btn-min"></span>
                <span class="btn-max"></span>
                <span class="btn-close"></span>
            </div>
        </div>

        <div class="window-body" id="project-description">
            <!-- router injects paragraphs -->
        </div>
    </div>

    <!-- DETAILS (PANELS) WINDOW -->
    <div class="project-window" id="project-panels-window">
        <div class="window-titlebar">
            <span>DETAILS.TXT</span>

            <div class="title-buttons">
                <span class="btn-min"></span>
                <span class="btn-max"></span>
                <span class="btn-close"></span>
            </div>
        </div>

        <div class="window-body">
            <div class="project-panels-grid">

                <div class="project-panel">
                    <h3>Technologies</h3>
                    <ul class="project-list" id="project-technos"></ul>
                </div>

                <div class="project-panel">
                    <h3>Deliverables</h3>
                    <ul class="project-list" id="project-deliverables"></ul>
                </div>

            </div>
        </div>
    </div>

    <!-- GALLERY -->
    <section class="project-gallery" id="project-gallery"></section>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
    <span id="lightbox-close">X</span>
    <img>
</div>
